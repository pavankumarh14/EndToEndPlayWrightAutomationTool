<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="430" viewBox="0 0 1200 430" role="img" aria-labelledby="title desc">
  <title id="title">Create, review, approve, and pull request flow</title>
  <desc id="desc">A left-to-right flow from creating a Playwright script to reviewing and approving a proposal, then creating a draft pull request.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#167d74"/></marker>
    <style>text{font-family:Arial,sans-serif;fill:#1e293b}.title{font-size:21px;font-weight:700}.label{font-size:16px;font-weight:700}.body{font-size:13px;fill:#52647d}.box{fill:#fff;stroke:#cbd5e1;stroke-width:2}.accent{fill:#e9f8f5;stroke:#167d74;stroke-width:2}.line{stroke:#167d74;stroke-width:3;marker-end:url(#arrow)}</style>
  </defs>
  <rect width="1200" height="430" fill="#f8fafc" rx="16"/>
  <text x="48" y="55" class="title">Create a Playwright test and open a draft pull request</text>
  <rect x="48" y="110" width="190" height="145" rx="12" class="box"/>
  <text x="72" y="148" class="label">1. Create script</text><text x="72" y="178" class="body">Paste or upload a script,</text><text x="72" y="198" class="body">or record from a URL with</text><text x="72" y="218" class="body">local Playwright Codegen.</text>
  <line x1="238" y1="182" x2="300" y2="182" class="line"/>
  <rect x="302" y="110" width="250" height="145" rx="12" class="accent"/>
  <text x="326" y="148" class="label">2. Analyze locally</text><text x="326" y="178" class="body">AST extracts the workflow.</text><text x="326" y="198" class="body">The project index finds reuse.</text><text x="326" y="218" class="body">Optional AI reviews limited metadata.</text>
  <line x1="552" y1="182" x2="614" y2="182" class="line"/>
  <rect x="616" y="110" width="245" height="145" rx="12" class="box"/>
  <text x="640" y="148" class="label">3. Review &amp; approve</text><text x="640" y="178" class="body">Check rules, change scope,</text><text x="640" y="198" class="body">confidence, and proposed files.</text><text x="640" y="218" class="body">Only a person can approve.</text>
  <line x1="861" y1="182" x2="923" y2="182" class="line"/>
  <rect x="925" y="110" width="225" height="145" rx="12" class="accent"/>
  <text x="949" y="148" class="label">4. Draft PR</text><text x="949" y="178" class="body">Approved files are committed</text><text x="949" y="198" class="body">to an automation branch and</text><text x="949" y="218" class="body">a draft PR is created or updated.</text>
  <text x="48" y="335" class="body">If AI is unavailable or rate-limited, the analysis continues with the closest safe AST and project-index result.</text>
</svg>
